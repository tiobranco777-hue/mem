<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Você ❤️</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ffb6c1,#ff4d88);
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    padding: 25px;
    border-radius: 20px;
    width: 85%;
    max-width: 500px;
    text-align:center;
    color:white;
    box-shadow: 0 0 25px rgba(0,0,0,0.2);
}

h1{
    font-size: 28px;
    margin-bottom: 15px;
}

p{
    font-size: 18px;
    line-height: 1.6;
}

.heart{
    position:absolute;
    bottom:-20px;
    color:#ff1744;
    font-size:20px;
    animation: subir 7s linear infinite;
}

@keyframes subir{
    0%{transform: translateY(0) scale(0.8); opacity:0;}
    20%{opacity:1;}
    100%{transform: translateY(-110vh) scale(1.4); opacity:0;}
}

.rose{
    position:absolute;
    top:-30px;
    font-size:22px;
    animation: cair 8s linear infinite;
}

@keyframes cair{
    0%{transform: translateY(0) rotate(0);}
    100%{transform: translateY(110vh) rotate(360deg);}
}

@media(max-width:600px){
    h1{font-size:24px;}
    p{font-size:16px;}
}
</style>
</head>

<body>

<div class="container">
<h1>❤️ Para Você ❤️</h1>

<p>
Te amo na calma e na tempestade, no teu melhor e no teu pior.<br><br>

Te amo pelo que você é quando ninguém tá vendo e pela forma que você transforma até os meus dias comuns.<br><br>

Vou estar aqui quando precisar, nos momentos fáceis e difíceis. 🌹❤️
</p>
</div>

<script>
function criarCoracao(){
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = (15 + Math.random()*20) + "px";
    heart.style.animationDuration = (4 + Math.random()*4) + "s";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),8000);
}

function criarRosa(){
    const rose = document.createElement("div");
    rose.className = "rose";
    rose.innerHTML = "🌹";
    rose.style.left = Math.random()*100 + "vw";
    rose.style.fontSize = (18 + Math.random()*20) + "px";
    rose.style.animationDuration = (5 + Math.random()*5) + "s";
    document.body.appendChild(rose);
    setTimeout(()=>rose.remove(),10000);
}

setInterval(criarCoracao, 300);
setInterval(criarRosa, 600);
</script>

</body>
</html>
